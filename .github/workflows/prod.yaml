name: ci

on:
  push:
    branches:
      - main
      - dev

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Étape cruciale pour que Docker voit tes fichiers !

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Utilise 'secrets' ou 'vars' selon où tu as enregistré ton pseudo
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # Indique à Docker de chercher le Dockerfile ici
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/application:latest